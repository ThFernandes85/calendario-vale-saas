<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Gradientes para o Escudo/V Central -->
    <linearGradient id="gradVerde" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a86b" />
      <stop offset="100%" stop-color="#1f5f38" />
    </linearGradient>
    <linearGradient id="gradAzul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a6f97" />
      <stop offset="100%" stop-color="#012a4a" />
    </linearGradient>
    <linearGradient id="gradOuro" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f4a261" />
      <stop offset="100%" stop-color="#e76f51" />
    </linearGradient>

    <!-- Sombra projetada para dar profundidade -->
    <filter id="sombra" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Fundo escuro (estilo sala de controle) -->
  <rect width="100%" height="100%" fill="#1a1e24" />

  <g transform="translate(0, -30)">
    <!-- Anéis externos tecnológicos -->
    <circle cx="400" cy="250" r="140" fill="none" stroke="url(#gradAzul)" stroke-width="4" stroke-dasharray="20, 10, 5, 10" opacity="0.7" />
    <circle cx="400" cy="250" r="150" fill="none" stroke="url(#gradVerde)" stroke-width="3" stroke-dasharray="40, 15" opacity="0.6" />

    <!-- Engrenagem central (industrial) -->
    <g filter="url(#sombra)">
      <circle cx="400" cy="250" r="70" fill="none" stroke="url(#gradOuro)" stroke-width="14" stroke-dasharray="30, 12" />
      <circle cx="400" cy="250" r="65" fill="#22262f" stroke="url(#gradOuro)" stroke-width="3" />
    </g>

    <!-- Escudo em "V" estilizado (integração e proteção) -->
    <g filter="url(#sombra)">
      <!-- Lado esquerdo (azul) -->
      <path d="M 400,250 L 330,150 L 365,130 L 400,200 Z" fill="url(#gradAzul)" />
      <!-- Lado direito (verde) -->
      <path d="M 400,250 L 470,150 L 435,130 L 400,200 Z" fill="url(#gradVerde)" />
      <!-- Detalhe superior de fechamento -->
      <path d="M 365,130 L 400,110 L 435,130 L 400,145 Z" fill="#2b303c" opacity="0.8" />
    </g>

    <!-- Relógio / cronograma (ponteiros e marcadores) -->
    <g fill="none" stroke="#ffffff" stroke-linecap="round" opacity="0.9">
      <!-- Ponteiros marcando tempo planejado -->
      <line x1="400" y1="250" x2="400" y2="215" stroke-width="4" stroke="url(#gradOuro)" />
      <line x1="400" y1="250" x2="430" y2="260" stroke-width="3" stroke="#ffffff" />
      <circle cx="400" cy="250" r="4" fill="#ffffff" stroke="none" />

      <!-- Indicadores de turnos (3h, 6h, 9h) legíveis -->
      <text x="438" y="254" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" stroke="none" text-anchor="middle">3</text>
      <text x="400" y="292" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" stroke="none" text-anchor="middle">6</text>
      <text x="362" y="254" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" stroke="none" text-anchor="middle">9</text>
    </g>
  </g>

  <!-- Textos do logotipo -->
  <g text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- Título principal -->
    <text x="400" y="440" font-size="38" font-weight="800" fill="#ffffff" letter-spacing="3">
      CRONOGRAMA INTEGRADO
    </text>

    <!-- Subtítulo SaaS -->
    <text x="400" y="485" font-size="18" font-weight="400" fill="#98a2b3" letter-spacing="1">
      SISTEMA DE CALENDÁRIO INDUSTRIAL <tspan fill="url(#gradVerde)" font-weight="bold">(SaaS)</tspan>
    </text>
  </g>
</svg>
